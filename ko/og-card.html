<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body{
    width:1200px; height:630px; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:#fff; position:relative;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(129,140,248,.45), transparent 60%),
      radial-gradient(700px 500px at -5% 110%, rgba(56,189,248,.30), transparent 55%),
      linear-gradient(135deg,#1e1b4b 0%, #312e81 45%, #4f46e5 100%);
  }
  .pad{ padding:74px 80px; height:100%; display:flex; flex-direction:column; justify-content:space-between; }
  .eyebrow{ font-size:24px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#c7d2fe; }
  .mark{ font-size:128px; font-weight:800; letter-spacing:-.03em; line-height:1; margin-top:18px; }
  .mark b{ color:#a5b4fc; }
  .dot{ color:#818cf8; }
  .tag{ font-size:40px; font-weight:600; line-height:1.25; margin-top:26px; max-width:980px; color:#eef2ff; }
  .chips{ display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; }
  .chip{ font-size:24px; font-weight:600; padding:12px 22px; border-radius:999px;
         background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22); color:#e0e7ff; }
  .foot{ display:flex; align-items:center; justify-content:space-between; }
  .url{ font-size:28px; font-weight:700; color:#fff; }
  .meta{ font-size:22px; color:#c7d2fe; }
</style>
</head>
<body>
  <div class="pad">
    <div>
      <div class="eyebrow">Open-source · for every level</div>
      <div class="mark"><b>AI</b><span class="dot">·</span>lmanac</div>
      <div class="tag">Get genuinely great results from Claude — and any AI. Interactive tools, honest freshness, no fluff.</div>
    </div>
    <div class="chips">
      <span class="chip">🧰 6 in-browser tools</span>
      <span class="chip">✅ Always-current</span>
      <span class="chip">🏷️ Level-tagged</span>
      <span class="chip">🌍 11 languages</span>
    </div>
    <div class="foot">
      <div class="url">derob98.github.io/ailmanac</div>
      <div class="meta">Free · CC BY 4.0 + MIT</div>
    </div>
  </div>
</body>
</html>
